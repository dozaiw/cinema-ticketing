# Sanitized for git upload. Fill these values locally before running.
spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/cinema?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:CHANGE_ME}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:CHANGE_ME}
      database: ${REDIS_DATABASE:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:CHANGE_ME}
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:YOUR_DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen3.5-flash}
          multi-model: true
          temperature: 0.7
          max-tokens: 2048
  cloud:
    nacos:
      config:
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:CHANGE_ME}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:CHANGE_ME_NAMESPACE}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_DISCOVERY_USERNAME:nacos}
        password: ${NACOS_DISCOVERY_PASSWORD:CHANGE_ME}
        access-key: ${NACOS_ACCESS_KEY:CHANGE_ME}
        secret-key: ${NACOS_SECRET_KEY:CHANGE_ME}

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_JWT_SECRET}
  expire-time: ${JWT_EXPIRE_TIME:720000000}

internal:
  token: ${INTERNAL_SERVICE_TOKEN:Bearer CHANGE_ME_INTERNAL_TOKEN}

wechat:
  appid: ${WECHAT_APP_ID:wx0000000000000000}
  secret: ${WECHAT_APP_SECRET:CHANGE_ME_WECHAT_SECRET}

map:
  amap:
    key: ${AMAP_KEY:CHANGE_ME_AMAP_KEY}
    secret: ${AMAP_SECRET:CHANGE_ME_AMAP_SECRET}

cos:
  secret-id: ${COS_SECRET_ID:CHANGE_ME_COS_SECRET_ID}
  secret-key: ${COS_SECRET_KEY:CHANGE_ME_COS_SECRET_KEY}
  region: ${COS_REGION:ap-guangzhou}
  bucket-name: ${COS_BUCKET_NAME:your-bucket-name}
  domain: ${COS_DOMAIN:https://example.com}
  max-poster-size: 5
  max-trailer-size: 200
