# 服务器配置
server:
  port: 8000

spring:
  config:
    import: optional:classpath:cinema-shared.yml
  application:
    name: cinema-auth

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
